      #install-banner {

        transform: translateX(-50%) translateY(120px);
        width: calc(100% - 32px);
        max-width: 468px;
        background: linear-gradient(135deg, #3d1a08, #5c2a00);
        border: 2px solid #f59e0b;
        border-radius: 16px;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
        z-index: 400;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
        transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      }
      #install-banner.show {
        transform: translateX(-50%) translateY(0);
      }
      #install-banner .install-text {
        flex: 1;
      }
      #install-banner .install-title {
        font-weight: 800;
        font-size: 0.95rem;
        color: #fef3c7;
      }
      #install-banner .install-sub {
        font-size: 0.78rem;
        color: #ca8a04;
        margin-top: 2px;
      }
      #install-banner .btn-install {
        background: #f59e0b;
        color: #451a03;
        border: none;
        border-radius: 10px;
        padding: 10px 16px;
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        font-size: 0.9rem;
        cursor: pointer;
        white-space: nowrap;
      }
      #install-banner .btn-dismiss {
        background: transparent;
        border: none;
        color: #ca8a04;
        font-size: 1.2rem;
        cursor: pointer;
        padding: 6px;

        <div class="install-sub">Accede sin internet desde el móvil</div>
      </div>
      <button class="btn-install" id="btn-install">Instalar</button>
      <button class="btn-dismiss" id="btn-dismiss">✕</button>
    </div>

    <script type="module" src="./js/app.js"></script>
    <script>
      // Top date
      const now = new Date();
      const dias = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
      const meses = [
        "Ene",
        "Feb",
        "Mar",
        "Abr",
        "May",
        "Jun",
        "Jul",
        "Ago",
        "Sep",
        "Oct",
        "Nov",
        "Dic",
      ];
      document.getElementById("top-date").textContent =
        `${dias[now.getDay()]} ${now.getDate()} ${meses[now.getMonth()]}`;

      // PWA Install Banner
      let deferredPrompt;
      window.addEventListener("beforeinstallprompt", (e) => {
        e.preventDefault();
        deferredPrompt = e;
        const banner = document.getElementById("install-banner");
        if (!sessionStorage.getItem("install-dismissed")) {
          setTimeout(() => banner.classList.add("show"), 1500);
        }
      });
      document
        .getElementById("btn-install")
        .addEventListener("click", async () => {
          if (!deferredPrompt) return;
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          document.getElementById("install-banner").classList.remove("show");
        });
      document.getElementById("btn-dismiss").addEventListener("click", () => {
        document.getElementById("install-banner").classList.remove("show");
        sessionStorage.setItem("install-dismissed", "1");
      });
    </script>
