    <script>
      // Top date
      const now = new Date();
      const dias = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];
      const meses = [
        "Ene",
        "Feb",
        "Mar",
        "Abr",
        "May",
        "Jun",
        "Jul",
        "Ago",
        "Sep",
        "Oct",
        "Nov",
        "Dic",
      ];
      document.getElementById("top-date").textContent =
        `${dias[now.getDay()]} ${now.getDate()} ${meses[now.getMonth()]}`;
